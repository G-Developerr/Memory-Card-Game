<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Memory Cards - Infinity Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <div class="app-shell">
        <header class="app-header">
            <h1>Marvel Memory Cards</h1>
            <p class="subtitle">Infinity Edition</p>
        </header>

        <div class="hud">
            <p>Difficulty <span class="difficulty-label">Easy</span></p>
            <p>Time <span class="timer">00:00</span></p>
            <p>Moves <span class="moves">0</span></p>
            <p>Pairs <span class="score">0</span>/<span class="total-pairs">0</span></p>
            <p>Streak <span class="streak">0</span></p>
            <p>Best <span class="best-score">-</span></p>
        </div>

        <div class="progress-wrap" aria-label="Progress">
            <div class="progress-bar"></div>
        </div>

        <div class="actions">
            <label for="difficulty">Level</label>
            <select id="difficulty" onchange="changeDifficulty(this.value)">
                <option value="easy" selected>Easy (6 pairs)</option>
                <option value="medium">Medium (8 pairs)</option>
                <option value="hard">Hard (9 pairs)</option>
            </select>
            <button onclick="restart()">Restart</button>
            <button onclick="togglePause()" class="pause-btn">Pause</button>
        </div>

        <div class="grid-container"></div>
        <div class="win-message" aria-live="polite"></div>
    </div>
    <script src="index.js"></script>
</body>

</html>
